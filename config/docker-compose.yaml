services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - /Users/jiangwei/Documents/docker/monitor/radar.db:/app/radar.db
      - /Users/jiangwei/Documents/docker/monitor/.env:/app/.env
      - /Users/jiangwei/Documents/docker/monitor/logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
